services:
  postgres-hml:
    image: postgres:16-alpine
    container_name: valora-postgres-hml
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${VALORA_POSTGRES_DB:-valora_hml}
      POSTGRES_USER: ${VALORA_POSTGRES_USER:-valora_hml}
      POSTGRES_PASSWORD: ${VALORA_POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${VALORA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - valora_postgres_hml_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VALORA_POSTGRES_USER:-valora_hml} -d ${VALORA_POSTGRES_DB:-valora_hml}"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  valora_postgres_hml_data:
